<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Reihenschaltung</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:      #0d0f14;
    --surface: #151820;
    --border:  #232736;
    --accent:  #4af0c0;
    --wire:    #c8d8f0;
    --label:   #8899bb;
    --text:    #dde6f5;
    --u1:      #f0d060;
    --u2:      #f08040;
    --mono:    'IBM Plex Mono', monospace;
  }

  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&display=swap');

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 10px 10px 12px;
    gap: 10px;
    min-height: 100%;
  }

  /* ── Header ── */
  header {
    display: flex;
    align-items: baseline;
    gap: 10px;
  }
  header h1 {
    font-size: 0.85rem;
    font-weight: 600;
    letter-spacing: 0.15em;
    color: var(--accent);
    text-transform: uppercase;
  }
  header span {
    font-size: 0.62rem;
    color: var(--label);
    border: 1px solid var(--border);
    padding: 2px 6px;
    border-radius: 2px;
  }

  /* ── Circuit card ── */
  .circuit-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 10px 8px 6px;
    width: 100%;
    max-width: 420px;
  }

  svg#circuit {
    display: block;
    width: 100%;
    height: auto;
    overflow: visible;
  }

  /* SVG classes */
  .wire      { stroke: var(--wire); stroke-width: 2; fill: none; stroke-linecap: square; }
  .comp-body { fill: none; stroke: var(--wire); stroke-width: 2; }
  .lbl       { font-family: var(--mono); font-size: 12px; fill: var(--accent); font-weight: 600; }
  .sub       { font-family: var(--mono); font-size: 10px; fill: var(--label); }
  .node-dot  { fill: var(--wire); }
  .v1t       { font-family: var(--mono); font-size: 11px; fill: var(--u1); font-weight: 600; }
  .v2t       { font-family: var(--mono); font-size: 11px; fill: var(--u2); font-weight: 600; }
  .batt-long  { stroke: var(--wire); stroke-width: 3;   stroke-linecap: round; fill: none; }
  .batt-short { stroke: var(--wire); stroke-width: 1.5; stroke-linecap: round; fill: none; }

  /* ── Sliders ── */
  .sliders {
    width: 100%;
    max-width: 420px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .slider-block {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 8px 12px 6px;
  }

  .slider-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 6px;
  }
  .sname { font-size: 0.8rem; color: var(--accent); }
  .sval  { font-size: 0.95rem; font-weight: 600; color: var(--text); }
  .sunit { font-size: 0.68rem; color: var(--label); }

  input[type=range] {
    -webkit-appearance: none;
    width: 100%; height: 4px;
    border-radius: 2px;
    background: var(--border);
    outline: none; cursor: pointer;
    margin-bottom: 4px;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 20px; height: 20px;
    border-radius: 50%;
    background: var(--accent);
    border: 3px solid var(--bg);
    box-shadow: 0 0 6px rgba(74,240,192,0.5);
    cursor: pointer;
  }
  input[type=range]::-moz-range-thumb {
    width: 18px; height: 18px;
    border-radius: 50%;
    background: var(--accent);
    border: 3px solid var(--bg);
    cursor: pointer;
  }

  .tick-row {
    display: flex;
    justify-content: space-between;
    padding: 0 2px;
  }
  .tick { font-size: 0.6rem; color: var(--label); }

  /* ── Summary grid: 3 columns × 2 rows ── */
  .summary {
    width: 100%;
    max-width: 420px;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 6px;
  }
  .si {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 6px 8px;
    text-align: center;
  }
  .si-label { font-size: 0.58rem; color: var(--label); letter-spacing: 0.08em; text-transform: uppercase; }
  .si-val   { font-size: 1rem; font-weight: 600; margin-top: 2px; }
  .cg  { color: var(--accent); }
  .cu1 { color: var(--u1); }
  .cu2 { color: var(--u2); }
  .crat{ color: var(--accent); font-size: 0.85rem !important; }
</style>
</head>
<body>

<header>
  <h1>Reihenschaltung</h1>
  <span>IEC 60617</span>
</header>

<!-- ── Circuit ── -->
<div class="circuit-card">
  <!--
    viewBox 400 × 190
    Top rail y=40, Bot rail y=160
    Left x=55 (battery), Right x=370
    R1: x=110..190, R2: x=220..300
  -->
  <svg id="circuit" viewBox="0 0 400 195" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <marker id="arr" markerWidth="7" markerHeight="7" refX="5" refY="2.5" orient="auto">
        <path d="M0,0 L0,5 L7,2.5 z" fill="#4af0c0" opacity="0.7"/>
      </marker>
    </defs>

    <!-- ══ WIRES ══ -->
    <line class="wire" x1="55"  y1="40"  x2="110" y2="40"/>
    <line class="wire" x1="190" y1="40"  x2="220" y2="40"/>
    <line class="wire" x1="300" y1="40"  x2="370" y2="40"/>
    <line class="wire" x1="370" y1="40"  x2="370" y2="160"/>
    <line class="wire" x1="55"  y1="160" x2="370" y2="160"/>
    <line class="wire" x1="55"  y1="40"  x2="55"  y2="78"/>
    <line class="wire" x1="55"  y1="102" x2="55"  y2="160"/>

    <!-- ══ BATTERY – IEC single cell ══ -->
    <!-- Long bar = + (top) -->
    <line class="batt-long"  x1="30" y1="78"  x2="80" y2="78"/>
    <!-- Short bar = − (bottom) -->
    <line class="batt-short" x1="38" y1="102" x2="72" y2="102"/>

    <!-- +/− labels -->
    <text x="84" y="82"  font-family="IBM Plex Mono,monospace" font-size="12" fill="#4af0c0">+</text>
    <text x="84" y="107" font-family="IBM Plex Mono,monospace" font-size="12" fill="#8899bb">−</text>

    <!-- Uin annotation -->
    <text class="lbl" x="18" y="87"  text-anchor="middle">U</text>
    <text class="sub" x="18" y="98"  text-anchor="middle">in</text>
    <text font-family="IBM Plex Mono,monospace" font-size="10" fill="#c8d8f0" font-weight="600"
          x="18" y="110" text-anchor="middle">10 V</text>

    <!-- ══ R1 ══ -->
    <rect class="comp-body" x="110" y="27" width="80" height="26"/>
    <text class="lbl" x="150" y="20" text-anchor="middle">R₁</text>
    <text id="v1-svg" class="v1t" x="150" y="68" text-anchor="middle">—</text>
    <text class="sub"             x="150" y="79" text-anchor="middle">U₁</text>

    <!-- ══ R2 ══ -->
    <rect class="comp-body" x="220" y="27" width="80" height="26"/>
    <text class="lbl" x="260" y="20" text-anchor="middle">R₂</text>
    <text id="v2-svg" class="v2t" x="260" y="68" text-anchor="middle">—</text>
    <text class="sub"             x="260" y="79" text-anchor="middle">U₂</text>

    <!-- ══ Current arrow ══ -->
    <line x1="300" y1="160" x2="230" y2="160"
          stroke="#4af0c0" stroke-width="1.5" stroke-dasharray="4 3"
          marker-end="url(#arr)" opacity="0.55"/>
    <text x="265" y="175" text-anchor="middle"
          font-family="IBM Plex Mono,monospace" font-size="10"
          fill="#4af0c0" opacity="0.65">I</text>

    <!-- Corners -->
    <circle class="node-dot" cx="55"  cy="40"  r="3"/>
    <circle class="node-dot" cx="370" cy="40"  r="3"/>
    <circle class="node-dot" cx="370" cy="160" r="3"/>
    <circle class="node-dot" cx="55"  cy="160" r="3"/>
  </svg>
</div>

<!-- ── Sliders ── -->
<div class="sliders">
  <div class="slider-block">
    <div class="slider-header">
      <span class="sname">R₁</span>
      <span><span id="r1-val" class="sval">5</span><span class="sunit"> Ω</span></span>
    </div>
    <input type="range" id="slider-r1" min="0" max="10" step="1" value="5">
    <div class="tick-row">
      <span class="tick">0</span><span class="tick">1</span><span class="tick">2</span>
      <span class="tick">3</span><span class="tick">4</span><span class="tick">5</span>
      <span class="tick">6</span><span class="tick">7</span><span class="tick">8</span>
      <span class="tick">9</span><span class="tick">10</span>
    </div>
  </div>
  <div class="slider-block">
    <div class="slider-header">
      <span class="sname">R₂</span>
      <span><span id="r2-val" class="sval">4</span><span class="sunit"> Ω</span></span>
    </div>
    <input type="range" id="slider-r2" min="0" max="10" step="1" value="4">
    <div class="tick-row">
      <span class="tick">0</span><span class="tick">1</span><span class="tick">2</span>
      <span class="tick">3</span><span class="tick">4</span><span class="tick">5</span>
      <span class="tick">6</span><span class="tick">7</span><span class="tick">8</span>
      <span class="tick">9</span><span class="tick">10</span>
    </div>
  </div>
</div>

<!-- ── Summary 3×2 ── -->
<div class="summary">
  <div class="si"><div class="si-label">R ges</div><div id="sum-r"  class="si-val cg">—</div></div>
  <div class="si"><div class="si-label">Strom I</div><div id="sum-i"  class="si-val cg">—</div></div>
  <div class="si"><div class="si-label">R₁ / R₂</div><div id="sum-rr" class="si-val crat">—</div></div>
  <div class="si"><div class="si-label">U₁</div><div id="sum-u1" class="si-val cu1">—</div></div>
  <div class="si"><div class="si-label">U₂</div><div id="sum-u2" class="si-val cu2">—</div></div>
  <div class="si"><div class="si-label">U₁ / U₂</div><div id="sum-ur" class="si-val crat">—</div></div>
</div>

<script>
  const UB = 10;
  const s1 = document.getElementById('slider-r1');
  const s2 = document.getElementById('slider-r2');

  function fmt(v, d=2) { return Number(v).toFixed(d); }
  function gcd(a,b) { return b===0?a:gcd(b,a%b); }
  function frac(a,b) {
    if(a===0&&b===0) return '—';
    if(b===0) return '∞';
    if(a===0) return '0';
    const g=gcd(a,b), na=a/g, nb=b/g;
    return nb===1?`${na}`:`${na}:${nb}`;
  }

  function update() {
    const R1=+s1.value, R2=+s2.value, Rg=R1+R2;
    document.getElementById('r1-val').textContent = R1;
    document.getElementById('r2-val').textContent = R2;
    document.getElementById('sum-r').textContent  = Rg+' Ω';
    document.getElementById('sum-rr').textContent = frac(R1,R2);

    if(Rg===0){
      ['v1-svg','v2-svg'].forEach(id=>document.getElementById(id).textContent='0.00 V');
      document.getElementById('sum-i').textContent='∞ A';
      document.getElementById('sum-u1').textContent='0.00 V';
      document.getElementById('sum-u2').textContent='0.00 V';
      document.getElementById('sum-ur').textContent='—';
      return;
    }
    const I=UB/Rg, U1=I*R1, U2=I*R2;
    document.getElementById('v1-svg').textContent = fmt(U1)+' V';
    document.getElementById('v2-svg').textContent = fmt(U2)+' V';
    document.getElementById('sum-i').textContent  = fmt(I,3)+' A';
    document.getElementById('sum-u1').textContent = fmt(U1)+' V';
    document.getElementById('sum-u2').textContent = fmt(U2)+' V';
    document.getElementById('sum-ur').textContent = frac(R1,R2);
  }

  s1.addEventListener('input', update);
  s2.addEventListener('input', update);
  update();
</script>
</body>
</html>
